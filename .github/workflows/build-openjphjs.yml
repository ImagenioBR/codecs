name: Build & Release codec-openjph (Imagenio fork)

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release with tarball (true/false)'
        required: false
        default: 'false'
  push:
    tags:
      - 'openjphjs-v*'

permissions:
  contents: write

jobs:
  build:
    name: Build WASM + release tarball
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Verify emcc
        run: emcc --version

      - name: Build openjphjs
        working-directory: packages/openjphjs
        run: |
          bash build.sh
          ls -la build/src/openjphjs.js build/src/openjphjs.wasm
          ls -la dist/openjphjs.js dist/openjphjs.wasm

      - name: Smoke check WASM artifact has -fwasm-exceptions support
        working-directory: packages/openjphjs
        run: |
          if grep -q '_setThrew' dist/openjphjs.js; then
            echo "ERRO: dist/openjphjs.js contém referência a _setThrew — patch -fwasm-exceptions não foi aplicado"
            exit 1
          fi
          if grep -q 'invoke_' dist/openjphjs.js; then
            echo "ERRO: dist/openjphjs.js contém referência a invoke_* — patch -fwasm-exceptions não foi aplicado"
            exit 1
          fi
          echo "OK: WASM artifact não tem refs a _setThrew nem invoke_* (patch aplicado corretamente)"

      - name: npm pack (gera tarball)
        working-directory: packages/openjphjs
        run: |
          # build.sh já rodou acima; remover prepublishOnly pra npm pack não re-buildar
          npm pkg delete scripts.prepublishOnly
          TARBALL=$(npm pack --silent)
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "Gerado: $TARBALL"
          tar -tzf "$TARBALL" | head -20

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: codec-openjph-tarball
          path: packages/openjphjs/${{ env.TARBALL }}
          retention-days: 30

      - name: Create GitHub Release with tarball asset
        if: startsWith(github.ref, 'refs/tags/') || inputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        working-directory: packages/openjphjs
        run: |
          # Em workflow_dispatch (sem tag), usa a versão do package.json como tag.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER=$(node -p "require('./package.json').version")
            TAG="openjphjs-v${VER}"
          fi
          echo "Release tag: $TAG"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            && gh release upload "$TAG" "$TARBALL" --repo "$GITHUB_REPOSITORY" --clobber \
            || gh release create "$TAG" "$TARBALL" \
                 --repo "$GITHUB_REPOSITORY" \
                 --title "codec-openjph $TAG" \
                 --notes "Build Imagenio do @cornerstonejs/codec-openjph com patch -fwasm-exceptions (resolve _setThrew is not defined). Release tarball instalável via npm sem auth: \`npm install <url-deste-asset>\`. Smoke check de ausência de _setThrew/invoke_* passou no CI."
